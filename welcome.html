<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            background-color: #ececec;
        }
        nav {
            background-color: #007bff;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
        }
        nav .username {
            font-size: 1em;
        }
        nav button {
            background-color: #ff6666;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
        }
        nav button:hover {
            background-color: #e60000;
        }
        .welcome-message {
            text-align: center;
            margin-top: 50px;
            font-size: 2em;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: auto;
        }
        .preference {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        .toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle input {
            opacity: 0;
            width: 100%;
            height: 100%;
            position: absolute;
            cursor: pointer;
        }
        .slider {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: '';
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #007bff;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <nav>
        <div class="username" id="username-display"></div>
        <button id="logout-button">Logout</button>
    </nav>
    <div class="welcome-message">Welcome to the Website!</div>
    <div class="card">
        <h2 style="margin-bottom: 20px;">User Preferences Attributes</h2>
        <div class="preference">
            <span>Guided Tours</span>
            <label class="toggle">
                <input type="checkbox" id="guidedTours" onchange="updatePreferences()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="preference">
            <span>Onboarding Bot</span>
            <label class="toggle">
                <input type="checkbox" id="onboardingBot" onchange="updatePreferences()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="preference">
            <span>Product Updates</span>
            <label class="toggle">
                <input type="checkbox" id="productUpdates" onchange="updatePreferences()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="preference">
            <span>Surveys</span>
            <label class="toggle">
                <input type="checkbox" id="surveys" onchange="updatePreferences()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="preference">
            <span>Track Email Analytics</span>
            <label class="toggle">
                <input type="checkbox" id="trackEmailAnalytics" onchange="updatePreferences()">
                <span class="slider"></span>
            </label>
        </div>
        <div class="preference">
            <span>Track Usage</span>
            <label class="toggle">
                <input type="checkbox" id="trackUsage" onchange="updatePreferences()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <!-- User Initialization -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            if (!loggedInUser) {
                window.location.href = 'index.html';
                return;
            }

            const apiKey = "ef669dfd-836a-47b5-90f3-b72d";
            // Construct URL using the logged-in user's ID
            const url = `https://api.aptrinsic.com/v2/user/preferences/${loggedInUser.id}`;

            const initialPreferences = {
                guidedTours: false,
                onboardingBot: false,
                productUpdates: false,
                surveys: false,
                trackEmailAnalytics: false,
                trackUsage: false
            };

            document.getElementById('username-display').innerText = `Hello, ${loggedInUser.name}!`;
            document.getElementById('logout-button').addEventListener('click', function() {
                localStorage.removeItem('loggedInUser');
                window.location.href = 'index.html';
            });

            for (const key in initialPreferences) {
                document.getElementById(key).checked = initialPreferences[key];
            }
        });
    </script>

    <!-- Preferences Update -->
    <script>
        async function updatePreferences() {
            const loggedInUser = JSON.parse(localStorage.getItem('loggedInUser'));
            const apiKey = "ef669dfd-836a-47b5-90f3-b72d749c7c66";
            // Construct URL using the logged-in user's ID
            const url = `https://api.aptrinsic.com/v2/user/preferences/${loggedInUser.id}`;

            const values = {
                guidedTours: document.getElementById('guidedTours').checked,
                onboardingBot: document.getElementById('onboardingBot').checked,
                productUpdates: document.getElementById('productUpdates').checked,
                surveys: document.getElementById('surveys').checked,
                trackEmailAnalytics: document.getElementById('trackEmailAnalytics').checked,
                trackUsage: document.getElementById('trackUsage').checked
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(values),
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok ' + response.statusText);
                }

                const data = await response.json();
                console.log('Success:', data);
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>

</body>
</html>
