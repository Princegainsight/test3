            Select an option

            <li style="padding: 12px 16px; cursor: pointer;" onclick="selectOption('Option 1')">Option 1</li>

            <li style="padding: 12px 16px; cursor: pointer;" onclick="selectOption('Option 3')">Option 3</li>
        </ul>
    </span>

    <script>
        const dropdownButton = document.getElementById('dropdownButton');
        const dropdownContent = document.getElementById('dropdownContent');

        dropdownButton.addEventListener('click', function() {
            dropdownContent.style.display = dropdownContent.style.display === "block" ? "none" : "block";
        });

        function selectOption(option) {
            dropdownButton.textContent = option;
            dropdownContent.style.display = "none";
        }

        window.onclick = function(event) {
            if (!event.target.matches('#dropdownButton')) {
                dropdownContent.style.display = "none";
            }
        }
    </script>

   <div style="background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 400px; margin: auto;">
    <h2 style="margin-bottom: 20px;">User Preferences Attributes</h2>

    <div class="preference" style="display: flex; justify-content: space-between; align-items: center; margin: 10px 0;">
        <span>Guided Tours</span>
        <label style="position: relative; display: inline-block; width: 50px; height: 24px;">
            <input type="checkbox" id="guidedTours" onchange="updatePreferences()" style="opacity: 0; width: 100%; height: 100%; position: absolute; cursor: pointer;">

        </label>

</div>

<script>
    const apiKey = "ef669dfd-836a-47b5-90f3-b72d749c7c66";
    const url = "https://api.aptrinsic.com/v2/user/preferences/${loggedInUser.id}";

    // Initialize all preferences to false
    const initialPreferences = {
        guidedTours: false,
        onboardingBot: false,
        productUpdates: false,
        surveys: false,
        trackEmailAnalytics: false,
        trackUsage: false
    };

    // Set initial states
    document.getElementById('guidedTours').checked = initialPreferences.guidedTours;
    document.getElementById('onboardingBot').checked = initialPreferences.onboardingBot;
    document.getElementById('productUpdates').checked = initialPreferences.productUpdates;
    document.getElementById('surveys').checked = initialPreferences.surveys;
    document.getElementById('trackEmailAnalytics').checked = initialPreferences.trackEmailAnalytics;
    document.getElementById('trackUsage').checked = initialPreferences.trackUsage;

    document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const sliderBackground = this.parentNode.querySelector('span');
            const sliderCircle = sliderBackground.nextElementSibling;
            sliderBackground.style.backgroundColor = this.checked ? '#007bff' : '#ccc';
            sliderCircle.style.transform = this.checked ? 'translateX(26px)' : 'translateX(0)';
        });
    });

    function getToggleValues() {
        return {
            guidedTours: document.getElementById('guidedTours').checked,
            onboardingBot: document.getElementById('onboardingBot').checked,
            productUpdates: document.getElementById('productUpdates').checked,
            surveys: document.getElementById('surveys').checked,
            trackEmailAnalytics: document.getElementById('trackEmailAnalytics').checked,
            trackUsage: document.getElementById('trackUsage').checked
        };
    }

    async function updatePreferences() {
        const values = getToggleValues();

        const body = {
            guidedTours: values.guidedTours,
            onboardingBot: values.onboardingBot,
            productUpdates: values.productUpdates,
            surveys: values.surveys,
            trackEmailAnalytics: values.trackEmailAnalytics,
            trackUsage: values.trackUsage
        };

        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(body),
            });

            if (!response.ok) {
                throw new Error('Network response was not ok ' + response.statusText);
            }

            const data = await response.json();
            console.log('Success:', data);
        } catch (error) {
            console.error('Error:', error);
        }
    }
</script>
