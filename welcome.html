<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Preferences Attributes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f7f7f7;
            margin: 20px;
        }
        h2 {
            margin-bottom: 20px;
        }
        .preference {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }
        .toggle {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .toggle input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #007bff;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
    </style>
</head>
<body>

<h2>User Preferences Attributes</h2>

<div class="preference">
    <span>Guided Tours</span>
    <label class="toggle">
        <input type="checkbox" checked>
        <span class="slider"></span>
    </label>
</div>
<div class="preference">
    <span>Onboarding Bot</span>
    <label class="toggle">
        <input type="checkbox">
        <span class="slider"></span>
    </label>
</div>
<div class="preference">
    <span>Product Updates</span>
    <label class="toggle">
        <input type="checkbox">
        <span class="slider"></span>
    </label>
</div>
<div class="preference">
    <span>Surveys</span>
    <label class="toggle">
        <input type="checkbox">
        <span class="slider"></span>
    </label>
</div>
<div class="preference">
    <span>Track Email Analytics</span>
    <label class="toggle">
        <input type="checkbox">
        <span class="slider"></span>
    </label>
</div>
<div class="preference">
    <span>Track Usage</span>
    <label class="toggle">
        <input type="checkbox">
        <span class="slider"></span>
    </label>
</div>

</body>
</html>
