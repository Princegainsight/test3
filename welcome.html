    <script>
        const dropdownButton = document.getElementById('dropdownButton');

        dropdownButton.addEventListener('click', function() {
            dropdownContent.style.display = dropdownContent.style.display === "block" ? "none" : "block";
        });

        function selectOption(option) {
            dropdownButton.textContent = option;
            dropdownContent.style.display = "none";

        window.onclick = function(event) {
            if (!event.target.matches('#dropdownButton')) {
                dropdownContent.style.display = "none";
            }

<!-- Modal Backdrop -->
<div id="modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;align-items:center;justify-content:center;">

  <!-- Modal Box -->
  <div style="background:#ffffff;border-radius:12px;border:0.5px solid #e5e7eb;padding:1.5rem;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.12);">
    <h3 style="margin:0 0 1rem;font-size:16px;font-weight:500;color:#111827;">Create new user</h3>

    <input
      type="text"
      id="user-name-input"
      placeholder="Enter user name"
      style="width:100%;box-sizing:border-box;padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;margin-bottom:1rem;outline:none;" />

    <div style="display:flex;justify-content:flex-end;gap:8px;">
      <button
        type="button"
        onclick="closeModal()"
        style="background:transparent;border:0.5px solid #d1d5db;border-radius:8px;padding:6px 16px;font-size:14px;cursor:pointer;color:#374151;">
        Cancel
      </button>
      <button
        type="button"
        onclick="createUser()"
        style="background:#2563eb;color:white;border:none;border-radius:8px;padding:6px 16px;font-size:14px;font-weight:500;cursor:pointer;">
        OK
      </button>
    </div>
  </div>

<script>
  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.getElementById('user-name-input').value = '';
  }

  function createUser() {
    const input = document.getElementById('user-name-input');
    const name = input.value.trim();
    if (!name) return;

    const btn = document.createElement('button');
    btn.type = 'button';
    btn.setAttribute('data-headlessui-state', '');
    btn.setAttribute('data-testid', 'user-name-button');
    btn.style.cssText = 'position:relative;isolation:isolate;display:inline-flex;align-items:center;justify-content:center;gap:0.5rem;border-radius:0.5rem;border:1px solid transparent;padding:0;text-align:left;font-weight:800;font-size:1.25rem;color:#1a1a1a;background:transparent;cursor:pointer;text-decoration:none;';

    const touchSpan = document.createElement('span');
    touchSpan.setAttribute('aria-hidden', 'true');
    touchSpan.style.cssText = 'position:absolute;top:50%;left:50%;width:max(100%,2.75rem);height:max(100%,2.75rem);transform:translate(-50%,-50%);';

    const nameSpan = document.createElement('span');
    nameSpan.textContent = name;

    btn.appendChild(touchSpan);
    btn.appendChild(nameSpan);

    document.getElementById('users-container').appendChild(btn);
    closeModal();
  }

  document.getElementById('user-name-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') createUser();
    if (e.key === 'Escape') closeModal();
  });
</script>

<script>
    const apiKey = "ef669dfd-836a-47b5-90f3-b72d749c7c66";
    const url = "https://api.aptrinsic.com/v2/user/preferences/prince1234";

    // Initialize all preferences to false
    const initialPreferences = {
        guidedTours: false,
        onboardingBot: false,
        productUpdates: false,
        surveys: false,
        trackEmailAnalytics: false,
        trackUsage: false
    };

    // Set initial states
    document.getElementById('guidedTours').checked = initialPreferences.guidedTours;
    document.getElementById('onboardingBot').checked = initialPreferences.onboardingBot;
    document.getElementById('productUpdates').checked = initialPreferences.productUpdates;
    document.getElementById('surveys').checked = initialPreferences.surveys;
    document.getElementById('trackEmailAnalytics').checked = initialPreferences.trackEmailAnalytics;
    document.getElementById('trackUsage').checked = initialPreferences.trackUsage;

    document.querySelectorAll('input[type="checkbox"]').forEach(checkbox => {
        checkbox.addEventListener('change', function() {
            const sliderBackground = this.parentNode.querySelector('span');
            const sliderCircle = sliderBackground.nextElementSibling;
            sliderBackground.style.backgroundColor = this.checked ? '#007bff' : '#ccc';
            sliderCircle.style.transform = this.checked ? 'translateX(26px)' : 'translateX(0)';
        });
    });

    function getToggleValues() {
        return {
            guidedTours: document.getElementById('guidedTours').checked,
            onboardingBot: document.getElementById('onboardingBot').checked,
            productUpdates: document.getElementById('productUpdates').checked,
            surveys: document.getElementById('surveys').checked,
            trackEmailAnalytics: document.getElementById('trackEmailAnalytics').checked,
            trackUsage: document.getElementById('trackUsage').checked
        };
    }

    async function updatePreferences() {
        const values = getToggleValues();

        const body = {
            guidedTours: values.guidedTours,
            onboardingBot: values.onboardingBot,
            productUpdates: values.productUpdates,
            surveys: values.surveys,
            trackEmailAnalytics: values.trackEmailAnalytics,
            trackUsage: values.trackUsage
        };

        try {
            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify(body),
            });

            if (!response.ok) {
                throw new Error('Network response was not ok ' + response.statusText);
            }

            const data = await response.json();
            console.log('Success:', data);
        } catch (error) {
            console.error('Error:', error);
        }
    }
</script>
